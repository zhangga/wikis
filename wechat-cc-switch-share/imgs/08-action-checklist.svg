<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#F5F7F6"/>
  <text x="110" y="110" font-size="56" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">把这次分享落到行动上</text>
  <text x="110" y="160" font-size="26" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#64777C">收藏观点不如执行清单，下面这 5 条最适合立刻开始</text>

  <rect x="120" y="240" width="1360" height="500" rx="32" fill="#FFFFFF" stroke="#DCE4E2" stroke-width="3"/>

  <circle cx="220" cy="330" r="26" fill="#D96E4A"/><text x="210" y="340" font-size="26" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#FFFFFF" font-weight="700">1</text>
  <text x="280" y="340" font-size="32" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#17343B" font-weight="700">先找真实痛点，再谈大功能</text>
  <text x="280" y="385" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#596B71">先做“今天就有人用”的能力，别先做“看起来很厉害”的能力</text>

  <circle cx="220" cy="430" r="26" fill="#17343B"/><text x="210" y="440" font-size="26" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#FFFFFF" font-weight="700">2</text>
  <text x="280" y="440" font-size="32" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#17343B" font-weight="700">把学习尽快转成 Demo</text>
  <text x="280" y="485" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#596B71">作品比收藏更能暴露问题，也更能换来真实反馈</text>

  <circle cx="220" cy="530" r="26" fill="#D9A441"/><text x="210" y="540" font-size="26" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#FFFFFF" font-weight="700">3</text>
  <text x="280" y="540" font-size="32" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#17343B" font-weight="700">默认路径必须对新手友好</text>
  <text x="280" y="585" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#596B71">让用户第一次就能成功，比教育用户重要得多</text>

  <circle cx="220" cy="630" r="26" fill="#3B7C74"/><text x="210" y="640" font-size="26" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#FFFFFF" font-weight="700">4</text>
  <text x="280" y="640" font-size="32" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#17343B" font-weight="700">把重构当成增长基础设施</text>
  <text x="280" y="685" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#596B71">现在不修路，后面每一步都会越来越慢</text>

  <circle cx="220" cy="730" r="26" fill="#506E8A"/><text x="210" y="740" font-size="26" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#FFFFFF" font-weight="700">5</text>
  <text x="280" y="740" font-size="32" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#17343B" font-weight="700">把 AI 嵌进工作流，不要只当聊天框</text>
  <text x="280" y="785" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#596B71">生成、审核、文档、校对、发布都可以拆开协同</text>
</svg>
