<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#F5F7FA"/>
  <text x="110" y="110" font-size="56" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">一个很重要的设计教训</text>
  <text x="110" y="160" font-size="26" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#62727B">不要用首页证明“我能做很多”，而要保证用户“第一次不容易做错”</text>

  <rect x="140" y="250" width="560" height="450" rx="34" fill="#FFF1EC" stroke="#F0D4CA" stroke-width="3"/>
  <text x="200" y="330" font-size="40" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#9A442E">早期方案</text>
  <rect x="210" y="390" width="420" height="220" rx="24" fill="#FFFFFF" stroke="#E9DDCF" stroke-width="2"/>
  <text x="255" y="455" font-size="28" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#42585E">首页直接暴露高级开关</text>
  <text x="255" y="505" font-size="28" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#42585E">代理接管</text>
  <text x="255" y="550" font-size="28" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#42585E">故障转移</text>
  <text x="255" y="615" font-size="28" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#9A442E" font-weight="700">结果：新手误操作，第一印象变复杂</text>

  <rect x="900" y="250" width="560" height="450" rx="34" fill="#EDF8F4" stroke="#D2E6DD" stroke-width="3"/>
  <text x="960" y="330" font-size="40" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#2B5F55">优化后方案</text>
  <rect x="970" y="390" width="420" height="220" rx="24" fill="#FFFFFF" stroke="#D9E6E3" stroke-width="2"/>
  <text x="1015" y="455" font-size="28" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#42585E">高级开关移入设置页</text>
  <text x="1015" y="505" font-size="28" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#42585E">增加“是否显示”选项</text>
  <text x="1015" y="550" font-size="28" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#42585E">默认隐藏，对专家仍可达</text>
  <text x="1015" y="615" font-size="28" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#2B5F55" font-weight="700">结果：默认路径更顺，认知负担更低</text>

  <path d="M730 475 H870" stroke="#17343B" stroke-width="12" fill="none"/>
  <polygon points="870,475 836,454 836,496" fill="#17343B"/>
</svg>
