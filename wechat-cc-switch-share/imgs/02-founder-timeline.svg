<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#F8F5EE"/>
  <text x="110" y="110" font-size="56" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">Jason 的转型时间线</text>
  <text x="110" y="160" font-size="26" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#61757B">最值得学的不是“转行”二字，而是把学习持续变成作品和反馈</text>

  <line x1="150" y1="450" x2="1450" y2="450" stroke="#D7C6B3" stroke-width="8"/>

  <circle cx="260" cy="450" r="34" fill="#D96E4A"/>
  <rect x="170" y="250" width="180" height="140" rx="26" fill="#FFFFFF" stroke="#E4D8CB" stroke-width="3"/>
  <text x="210" y="308" font-size="30" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">30 岁前</text>
  <text x="205" y="355" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#55686D">进出口贸易</text>

  <circle cx="560" cy="450" r="34" fill="#17343B"/>
  <rect x="450" y="520" width="220" height="150" rx="26" fill="#FFFFFF" stroke="#D5DFDE" stroke-width="3"/>
  <text x="500" y="580" font-size="30" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">2024 年中</text>
  <text x="495" y="625" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#55686D">重新思考长期方向</text>

  <circle cx="860" cy="450" r="34" fill="#D9A441"/>
  <rect x="730" y="250" width="260" height="160" rx="26" fill="#FFFFFF" stroke="#E7DBC5" stroke-width="3"/>
  <text x="780" y="310" font-size="30" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">2024 年底</text>
  <text x="770" y="355" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#55686D">系统学 AI</text>
  <text x="770" y="392" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#55686D">看一手信息 做 Demo</text>

  <circle cx="1160" cy="450" r="34" fill="#3B7C74"/>
  <rect x="1040" y="520" width="240" height="160" rx="26" fill="#FFFFFF" stroke="#D1E2DE" stroke-width="3"/>
  <text x="1090" y="580" font-size="30" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">2025 年</text>
  <text x="1075" y="625" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#55686D">测试版上线</text>
  <text x="1075" y="662" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#55686D">开源增长开始</text>

  <rect x="120" y="740" width="1360" height="90" rx="26" fill="#17343B"/>
  <text x="170" y="798" font-size="30" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#F4F8F8" font-weight="700">关键启发：不是先“准备好了”再开始，而是先进入 学习 -> 产出 -> 反馈 -> 迭代 的闭环</text>
</svg>
