<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#F4F7FB"/>
  <text x="110" y="110" font-size="56" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">AI 编程作战手册</text>
  <text x="110" y="160" font-size="26" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#60717D">真正比拼的不是单次提问，而是拆任务、控上下文、做交叉审查的能力</text>

  <rect x="120" y="250" width="310" height="420" rx="30" fill="#FFFFFF" stroke="#D9E3EA" stroke-width="3"/>
  <text x="175" y="320" font-size="34" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">1. 计划</text>
  <text x="175" y="395" font-size="27" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#4C6068">拆小任务</text>
  <text x="175" y="445" font-size="27" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#4C6068">明确目标</text>
  <text x="175" y="495" font-size="27" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#4C6068">控制范围</text>

  <rect x="500" y="220" width="310" height="480" rx="30" fill="#FFF6E8" stroke="#EDD8AC" stroke-width="3"/>
  <text x="555" y="290" font-size="34" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">2. 生成</text>
  <text x="555" y="365" font-size="27" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#5A4A2C">用擅长生成的模型</text>
  <text x="555" y="415" font-size="27" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#5A4A2C">先给初版</text>
  <text x="555" y="465" font-size="27" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#5A4A2C">别一口气写太多</text>

  <rect x="880" y="250" width="310" height="420" rx="30" fill="#EEF7F5" stroke="#D3E3DF" stroke-width="3"/>
  <text x="935" y="320" font-size="34" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#17343B">3. 审核</text>
  <text x="935" y="395" font-size="27" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#46615D">换另一个模型复审</text>
  <text x="935" y="445" font-size="27" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#46615D">避免自证正确</text>
  <text x="935" y="495" font-size="27" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#46615D">人做最终验收</text>

  <rect x="1260" y="250" width="220" height="420" rx="30" fill="#17343B"/>
  <text x="1310" y="330" font-size="34" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-weight="700" fill="#F3F7F7">4. 维护</text>
  <text x="1308" y="400" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#D5E3E3">压缩上下文</text>
  <text x="1308" y="445" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#D5E3E3">维护文档</text>
  <text x="1308" y="490" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#D5E3E3">限制文件膨胀</text>
  <text x="1308" y="535" font-size="24" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#D5E3E3">代码是负债</text>

  <path d="M430 460 H500" stroke="#D96E4A" stroke-width="10"/>
  <path d="M810 460 H880" stroke="#D96E4A" stroke-width="10"/>
  <path d="M1190 460 H1260" stroke="#D96E4A" stroke-width="10"/>

  <rect x="180" y="740" width="1240" height="90" rx="24" fill="#FFFFFF" stroke="#D9E3EA" stroke-width="3"/>
  <text x="235" y="797" font-size="30" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#17343B" font-weight="700">结论：AI 让“写代码”更便宜，也让“组织问题”更贵、更稀缺</text>
</svg>
