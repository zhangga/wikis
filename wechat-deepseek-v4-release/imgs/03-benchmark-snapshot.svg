<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081212"/>
      <stop offset="1" stop-color="#181a17"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #edf8f7; }
      .muted { fill: #95a9aa; }
      .flash { fill: #55e8f6; }
      .pro { fill: #e7c46a; }
      .track { fill: rgba(255,255,255,0.08); }
      .label { font-size: 30px; font-weight: 760; }
      .value { font-size: 28px; font-weight: 800; }
      .tiny { font-size: 22px; fill: #95a9aa; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="96" y="105" font-size="54" font-weight="850">DeepSeek V4 官方自测指标快照</text>
  <text x="98" y="152" font-size="26" class="muted">节选自 Hugging Face 模型卡｜比较：V4-Flash Max vs V4-Pro Max</text>
  <rect x="1050" y="188" width="28" height="28" class="flash"/>
  <text x="1090" y="211" class="label">Flash Max</text>
  <rect x="1260" y="188" width="28" height="28" class="pro"/>
  <text x="1300" y="211" class="label">Pro Max</text>
  <g transform="translate(110 270)">
    <text x="0" y="35" class="label">LiveCodeBench</text>
    <rect x="360" y="0" width="920" height="30" class="track" rx="15"/>
    <rect x="360" y="0" width="843" height="30" class="flash" rx="15"/>
    <rect x="360" y="42" width="860" height="30" class="pro" rx="15"/>
    <text x="1225" y="26" class="value">91.6</text>
    <text x="1244" y="68" class="value">93.5</text>
  </g>
  <g transform="translate(110 390)">
    <text x="0" y="35" class="label">SWE Verified</text>
    <rect x="360" y="0" width="920" height="30" class="track" rx="15"/>
    <rect x="360" y="0" width="727" height="30" class="flash" rx="15"/>
    <rect x="360" y="42" width="742" height="30" class="pro" rx="15"/>
    <text x="1110" y="26" class="value">79.0</text>
    <text x="1125" y="68" class="value">80.6</text>
  </g>
  <g transform="translate(110 510)">
    <text x="0" y="35" class="label">MRCR 1M</text>
    <rect x="360" y="0" width="920" height="30" class="track" rx="15"/>
    <rect x="360" y="0" width="724" height="30" class="flash" rx="15"/>
    <rect x="360" y="42" width="768" height="30" class="pro" rx="15"/>
    <text x="1107" y="26" class="value">78.7</text>
    <text x="1152" y="68" class="value">83.5</text>
  </g>
  <g transform="translate(110 630)">
    <text x="0" y="35" class="label">Terminal Bench 2.0</text>
    <rect x="360" y="0" width="920" height="30" class="track" rx="15"/>
    <rect x="360" y="0" width="523" height="30" class="flash" rx="15"/>
    <rect x="360" y="42" width="625" height="30" class="pro" rx="15"/>
    <text x="905" y="26" class="value">56.9</text>
    <text x="1008" y="68" class="value">67.9</text>
  </g>
  <text x="96" y="820" class="tiny">注：上图为官方模型卡自测节选，不等同于第三方独立评测。preview 版本仍需真实工作流验证。</text>
</svg>
