    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #eaf7f6; }
      .muted { fill: #8da2a4; }
      .label { fill: #a8f7ff; font-size: 30px; font-weight: 700; }
      .value { font-size: 64px; font-weight: 800; letter-spacing: 0; }
      .small { font-size: 26px; }
      .tiny { font-size: 22px; fill: #8da2a4; }
      .card { fill: rgba(255,255,255,0.055); stroke: rgba(150,255,255,0.28); stroke-width: 2; rx: 20; }
