  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M120 760 C420 610, 590 620, 800 450 C1010 280, 1190 300, 1480 140" fill="none" stroke="#42eaf7" stroke-opacity="0.18" stroke-width="8"/>
