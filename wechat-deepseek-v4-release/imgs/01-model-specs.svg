  <rect x="836" y="220" width="670" height="430" class="card"/>
  <text x="142" y="295" font-size="48" font-weight="850" fill="#9dfcff">V4-Flash</text>
  <text x="884" y="295" font-size="48" font-weight="850" fill="#fff0a8">V4-Pro</text>
