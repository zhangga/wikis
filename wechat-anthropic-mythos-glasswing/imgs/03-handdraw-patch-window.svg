<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-label="Hand-drawn shrinking cybersecurity patch window">
  <defs>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#203b3f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1400" height="820" rx="36" fill="#fbf7ed"/>
  <path d="M88 116 C322 74 600 84 828 110 C1054 136 1192 116 1310 84" fill="none" stroke="#ead8bd" stroke-width="13" stroke-linecap="round"/>
  <text x="90" y="92" font-size="40" font-weight="700" fill="#183b3f">AI 会压缩补丁窗口</text>
  <text x="92" y="140" font-size="24" fill="#66716a">真正危险的不是“知道漏洞”，而是攻击和修复都在加速。</text>

  <g transform="translate(108 280)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 0 H1120" stroke="#203b3f" stroke-width="5" marker-end="url(#arrow3)"/>
    <path d="M106 2 V-42 M450 2 V-42 M792 2 V-42 M1046 2 V-42" stroke="#203b3f" stroke-width="4"/>
    <g font-size="24" fill="#183b3f" font-weight="700">
      <text x="62" y="-70">漏洞公开</text>
      <text x="392" y="-70">补丁发布</text>
      <text x="710" y="-70">AI 反推利用</text>
      <text x="986" y="-70">批量扫描</text>
    </g>
  </g>

  <g transform="translate(142 402)">
    <text x="0" y="0" font-size="28" font-weight="700" fill="#183b3f">过去</text>
    <path d="M96 -8 C250 -28 474 -28 672 -8" fill="none" stroke="#74b6aa" stroke-width="20" stroke-linecap="round"/>
    <text x="770" y="0" font-size="24" fill="#34494a">还有相对缓冲期</text>
    <text x="106" y="54" font-size="22" fill="#61706b">几天到几周：读公告、看补丁、手工分析</text>
  </g>

  <g transform="translate(142 548)">
    <text x="0" y="0" font-size="28" font-weight="700" fill="#183b3f">现在</text>
    <path d="M96 -8 C170 -18 276 -18 360 -8" fill="none" stroke="#e7ad51" stroke-width="20" stroke-linecap="round"/>
    <path d="M390 -8 C436 -18 504 -18 560 -8" fill="none" stroke="#e7ad51" stroke-width="20" stroke-linecap="round" opacity="0.45"/>
    <text x="650" y="0" font-size="24" fill="#34494a">窗口被 AI 压短</text>
    <text x="106" y="54" font-size="22" fill="#61706b">模型能更快读差异、做验证、整理利用线索</text>
  </g>

  <g transform="translate(910 454)">
    <path d="M0 0 C36 -86 166 -86 214 0 C262 84 166 166 108 196 C48 164 -46 82 0 0Z" fill="#fffdf8" stroke="#203b3f" stroke-width="4" stroke-linejoin="round"/>
    <path d="M66 62 C88 84 106 104 132 126 C160 82 184 46 222 12" fill="none" stroke="#74b6aa" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="38" y="250" font-size="24" font-weight="700" fill="#183b3f">防守要更快系统化</text>
  </g>
</svg>
