<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#F4F8FB"/>
  <defs>
    <linearGradient id="mainFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4B7BF5"/>
      <stop offset="100%" stop-color="#2BAA9B"/>
    </linearGradient>
    <linearGradient id="directFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94A8B8"/>
      <stop offset="100%" stop-color="#CBD5DF"/>
    </linearGradient>
  </defs>

  <text x="96" y="104" font-size="54" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700" fill="#163447">Claude 通道的流量路径</text>
  <text x="96" y="152" font-size="24" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#5E7483">重点不是全局代理，而是只把 Claude 相关流量单独分给住宅代理</text>

  <rect x="92" y="230" width="210" height="430" rx="30" fill="#FFFFFF" stroke="#D9E5EE" stroke-width="3"/>
  <text x="146" y="300" font-size="36" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700" fill="#163447">客户端</text>
  <rect x="140" y="340" width="110" height="74" rx="14" fill="#EEF4FF" stroke="#BFD1F3" stroke-width="2"/>
  <text x="178" y="387" font-size="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#355372">电脑</text>
  <rect x="156" y="444" width="78" height="126" rx="18" fill="#EEF8F7" stroke="#B9E2DC" stroke-width="2"/>
  <text x="171" y="515" font-size="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#355372">手机</text>
  <text x="126" y="626" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#6E8492">设备先连进 VPS</text>

  <rect x="360" y="298" width="240" height="110" rx="24" fill="#FFFFFF" stroke="#C8D6F5" stroke-width="3"/>
  <text x="402" y="345" font-size="34" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700" fill="#244766">VLESS + Reality</text>
  <text x="420" y="385" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#658095">加密隧道</text>

  <rect x="664" y="218" width="290" height="450" rx="30" fill="#FFFFFF" stroke="#D9E5EE" stroke-width="3"/>
  <text x="724" y="286" font-size="38" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700" fill="#163447">AWS EC2</text>
  <rect x="716" y="338" width="184" height="92" rx="20" fill="#EEF4FF" stroke="#BDD0F2" stroke-width="2"/>
  <text x="779" y="394" font-size="32" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#284866">Xray</text>
  <rect x="716" y="472" width="184" height="92" rx="20" fill="#EEF8F7" stroke="#B9E2DC" stroke-width="2"/>
  <text x="757" y="528" font-size="32" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#24584E">mihomo</text>
  <text x="712" y="615" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#6E8492">Xray 接流量，mihomo 做分流</text>

  <rect x="1036" y="278" width="212" height="128" rx="26" fill="#EDF8F3" stroke="#CBE6DB" stroke-width="3"/>
  <text x="1080" y="342" font-size="34" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700" fill="#24584E">住宅代理</text>
  <text x="1094" y="382" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#64837D">只接 Claude 流量</text>

  <rect x="1324" y="278" width="196" height="128" rx="26" fill="#FFFFFF" stroke="#D9E5EE" stroke-width="3"/>
  <text x="1377" y="340" font-size="34" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700" fill="#163447">Anthropic</text>
  <text x="1377" y="380" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#6E8492">Claude API</text>

  <rect x="1170" y="544" width="260" height="110" rx="24" fill="#FFFFFF" stroke="#D9E5EE" stroke-width="3"/>
  <text x="1236" y="592" font-size="34" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-weight="700" fill="#163447">普通网站</text>
  <text x="1220" y="632" font-size="22" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#6E8492">Google / GitHub 等直连</text>

  <path d="M302 353 H360" stroke="url(#mainFlow)" stroke-width="14" stroke-linecap="round"/>
  <polygon points="360,353 330,335 330,371" fill="#4B7BF5"/>
  <path d="M600 353 H664" stroke="url(#mainFlow)" stroke-width="14" stroke-linecap="round"/>
  <polygon points="664,353 634,335 634,371" fill="#4B7BF5"/>
  <path d="M954 518 C1010 518 1018 430 1036 342" stroke="url(#mainFlow)" stroke-width="14" stroke-linecap="round" fill="none"/>
  <polygon points="1036,342 1010,360 1046,370" fill="#2BAA9B"/>
  <path d="M1248 342 H1324" stroke="url(#mainFlow)" stroke-width="14" stroke-linecap="round"/>
  <polygon points="1324,342 1294,324 1294,360" fill="#2BAA9B"/>

  <path d="M954 520 C1034 520 1080 590 1170 598" stroke="url(#directFlow)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <polygon points="1170,598 1140,580 1140,616" fill="#AAB8C3"/>

  <text x="430" y="274" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#5F7791">所有设备共用同一条入口</text>
  <text x="1038" y="246" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#3B6F69">Claude 相关流量</text>
  <text x="1014" y="652" font-size="20" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#7D8F9C">其他流量</text>

  <rect x="92" y="734" width="1412" height="98" rx="22" fill="#FFFFFF" stroke="#D9E5EE" stroke-width="2"/>
  <text x="132" y="792" font-size="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#244766">一句话理解：</text>
  <text x="334" y="792" font-size="28" font-family="'PingFang SC','Microsoft YaHei',sans-serif" fill="#4F6574">先把设备安全连到 VPS，再由 VPS 把 Claude 相关流量单独转给住宅代理，其他访问继续正常直连。</text>
</svg>
