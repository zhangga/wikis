  <text x="80" y="225" font-size="62" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#E26F4F" font-weight="700">不输出</text>
  <circle cx="621" cy="780" r="240" fill="#FFFFFF"/>
  <text x="530" y="800" font-size="56" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#1F3D46" font-weight="700">真的学会</text>
