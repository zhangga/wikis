<svg xmlns="http://www.w3.org/2000/svg" width="1242" height="1660" viewBox="0 0 1242 1660">
  <rect width="1242" height="1660" fill="#F6FAFA"/>
  <text x="80" y="150" font-size="62" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#E26F4F" font-weight="700">坑 4 总追新</text>
  <text x="80" y="225" font-size="62" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#E26F4F" font-weight="700">不筛选</text>
  <rect x="90" y="370" width="500" height="460" rx="40" fill="#FFFFFF"/>
  <text x="150" y="470" font-size="42" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#1F3D46" font-weight="700">先问 1</text>
  <text x="130" y="580" font-size="54" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#E26F4F" font-weight="700">能不能明显提效？</text>
  <rect x="650" y="370" width="500" height="460" rx="40" fill="#FFFFFF"/>
  <text x="710" y="470" font-size="42" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#1F3D46" font-weight="700">先问 2</text>
  <text x="690" y="580" font-size="54" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#E26F4F" font-weight="700">能不能长期复用？</text>
  <rect x="90" y="1040" width="1060" height="260" rx="44" fill="#FFF2EA"/>
  <text x="150" y="1140" font-size="42" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#1F3D46">别见一个新工具</text>
  <text x="150" y="1210" font-size="42" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#1F3D46">就立刻冲上去学</text>
  <text x="150" y="1280" font-size="50" font-family="'Microsoft YaHei','PingFang SC',sans-serif" fill="#E26F4F" font-weight="700">先判断，再投入</text>
</svg>
